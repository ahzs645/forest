name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint game content
        run: npm run lint:events --if-present

      # Gate the deploy on a fast browser smoke test: a keyboard-driven seasonal
      # playthrough plus the mobile no-overflow check. These build and serve the
      # app via `serve:e2e`, so a TUI page that won't load or play can't ship.
      # The full Playwright suite stays out of the deploy path (run it with
      # `npm run test:e2e`); this is the minimal "is the build alive" gate.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test browser build
        run: npx playwright test tests/e2e/tui-browser.spec.js tests/e2e/tui-browser-mobile.spec.js

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
